/* ─── HELPERS ───────────────────────────────────────────────────── */
function useInView(threshold = 0.12) {
  const ref = useRef();
  const [v, setV] = useState(false);
  useEffect(() => {
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setV(true); io.disconnect(); }
    }, { threshold });
    ref.current && io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return [ref, v];
}

function Reveal({ children, delay = 0, style = {}, as: As = 'div' }) {
  const [ref, v] = useInView();
  return <As ref={ref} style={{
    opacity: v ? 1 : 0,
    transform: v ? 'none' : 'translateY(40px)',
    transition: `opacity .8s ease ${delay}ms, transform .9s cubic-bezier(.16,.8,.2,1) ${delay}ms`,
    ...style
  }}>{children}</As>;
}

function Marquee({ children, speed = 0.6, reverse = false, style = {} }) {
  const ref = useRef();
  useEffect(() => {
    let raf, x = 0;
    const step = () => {
      x -= speed * (reverse ? -1 : 1);
      if (ref.current) {
        const w = ref.current.firstChild?.offsetWidth || 1200;
        if (x < -w) x = 0;
        if (x > 0) x = -w;
        ref.current.style.transform = `translateX(${x}px)`;
      }
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [speed, reverse]);
  return (
    <div style={{ overflow: 'hidden', whiteSpace: 'nowrap', ...style }}>
      <div ref={ref} style={{ display: 'inline-flex', willChange: 'transform' }}>
        <div>{children}</div>
        <div>{children}</div>
      </div>
    </div>
  );
}

/* ─── TWEAKS ─────────────────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#3A2BFF",
  "hotColor": "#FF4D2E",
  "bgColor": "#ECEAE4",
  "inkColor": "#0E0F12",
  "showMarquee": true
}/*EDITMODE-END*/;

function TweaksPanel({ tweaks, setTweaks, visible }) {
  if (!visible) return null;
  const set = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
      background: '#fff', border: '1px solid #ddd', borderRadius: 16,
      padding: '20px 22px', width: 260, boxShadow: '0 8px 40px rgba(0,0,0,0.14)',
      fontFamily: "'Inter Tight', system-ui, sans-serif", fontSize: 13,
    }}>
      <div style={{ fontWeight: 700, marginBottom: 16, fontSize: 14 }}>Tweaks</div>
      {[['accentColor','Akzent (Indigo)'],['hotColor','Hot (Orange-Rot)'],['bgColor','Hintergrund'],['inkColor','Tinte']].map(([k, l]) => (
        <label key={k} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <span style={{ color: '#555' }}>{l}</span>
          <input type="color" value={tweaks[k]} onChange={e => set(k, e.target.value)} style={{ width: 32, height: 24, borderRadius: 4, border: 'none', cursor: 'pointer' }}/>
        </label>
      ))}
      <label style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ color: '#555' }}>Marquee anzeigen</span>
        <input type="checkbox" checked={tweaks.showMarquee} onChange={e => set('showMarquee', e.target.checked)}/>
      </label>
    </div>
  );
}

/* ─── APP ───────────────────────────────────────────────────────── */
function App() {
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [tweaks, setTweaks] = useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('ictira-tweaks') || '{}') }; }
    catch { return TWEAK_DEFAULTS; }
  });

  useEffect(() => {
    localStorage.setItem('ictira-tweaks', JSON.stringify(tweaks));
    // apply token overrides dynamically
    Object.assign(T, {
      accent: tweaks.accentColor,
      hot:    tweaks.hotColor,
      bg:     tweaks.bgColor,
      ink:    tweaks.inkColor,
    });
  }, [tweaks]);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  return (
    <>
      <Nav />
      <main>
        <Hero />
        <Services />
        <Pricing />
        <Process />
        <Portfolio />
        <Faq />
        <Contact />
      </main>
      <Footer />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
